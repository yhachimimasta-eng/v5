<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecriture Comptable Maroc — Les Écritures Comptables</title>
  <meta name="description" content="Écritures comptables marocaines avec exemples détaillés : paie, TVA, IS, amortissements, leasing, banque, caisse...">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    /* ============ BASE ============ */
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;line-height:1.6;overflow-x:hidden;position:relative}
    .container{max-width:1280px;margin:0 auto;padding:0 24px}
    a{color:inherit;text-decoration:none}

    /* ============ BACKGROUND ============ */
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);z-index:0;pointer-events:none}
    .bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;animation:float 18s ease-in-out infinite}
    .bg-orb-1{width:520px;height:520px;background:#3b82f6;top:-120px;left:-120px}
    .bg-orb-2{width:480px;height:480px;background:#8b5cf6;bottom:-100px;right:-100px;animation-delay:-6s}
    .bg-orb-3{width:400px;height:400px;background:#10b981;top:40%;left:40%;animation-delay:-12s}
    @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.08)}}

    /* ============ NAV ============ */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 0;background:rgba(10,15,30,.7);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
    .navbar .container{display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700}
    .nav-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.85rem}
    .nav-logo-text{font-size:1.05rem;color:#fff}
    .nav-logo-text span{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent}

    /* ============ SECTION ============ */
    .section{position:relative;padding:120px 0 80px;z-index:1}
    .section-header{text-align:center;margin-bottom:48px}
    .section-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;font-size:.82rem;font-weight:600;background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);margin-bottom:16px}
    .section-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;color:#fff;margin-bottom:12px;letter-spacing:-.02em}
    .section-desc{color:#94a3b8;max-width:600px;margin:0 auto;font-size:1rem}

    /* ============ CARDS ============ */
    .ecritures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px}
    .glass-card{background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);border-radius:18px;backdrop-filter:blur(10px);transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease}
    .ecriture-card{padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;cursor:pointer;font-family:inherit;color:inherit;width:100%}
    button.ecriture-card{background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
    .ecriture-card:hover{transform:translateY(-6px);border-color:rgba(59,130,246,.4);box-shadow:0 18px 40px -10px rgba(59,130,246,.25)}
    .ecriture-card:focus-visible{outline:2px solid #3b82f6;outline-offset:3px}
    .ecriture-card h3{font-size:.95rem;color:#fff;font-weight:600;line-height:1.3}
    .ecriture-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;transition:transform .3s ease}
    .ecriture-card:hover .ecriture-icon{transform:scale(1.1) rotate(-6deg)}
    .icon-blue   {background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
    .icon-emerald{background:linear-gradient(135deg,#10b981,#047857)}
    .icon-purple {background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
    .icon-amber  {background:linear-gradient(135deg,#f59e0b,#b45309)}
    .icon-cyan   {background:linear-gradient(135deg,#06b6d4,#0e7490)}
    .icon-rose   {background:linear-gradient(135deg,#f43f5e,#9f1239)}
    .icon-indigo {background:linear-gradient(135deg,#6366f1,#3730a3)}

    /* ============ MODAL ============ */
    .ec-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .25s ease,visibility 0s linear .25s}
    .ec-modal.is-open{opacity:1;visibility:visible;pointer-events:auto;transition:opacity .25s ease}
    .ec-modal-backdrop{position:absolute;inset:0;background:rgba(5,10,25,.7);backdrop-filter:blur(8px);opacity:0;transition:opacity .25s ease}
    .ec-modal.is-open .ec-modal-backdrop{opacity:1}
    .ec-modal-dialog{position:relative;max-width:780px;width:100%;max-height:90vh;overflow:auto;background:linear-gradient(160deg,rgba(20,28,50,.96),rgba(15,20,40,.96));border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.5);transform:translateY(24px) scale(.96);opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s ease}
    .ec-modal.is-open .ec-modal-dialog{transform:translateY(0) scale(1);opacity:1}
    .ec-modal.is-closing .ec-modal-dialog{transform:translateY(12px) scale(.97);opacity:0;transition:transform .2s ease-in,opacity .2s ease-in}
    .ec-modal.is-closing .ec-modal-backdrop{opacity:0;transition:opacity .2s ease-in}
    .ec-modal-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:1rem}
    .ec-modal-close:hover{background:rgba(255,255,255,.15);transform:rotate(90deg)}
    .ec-modal-close:focus-visible,.ec-modal-dialog :focus-visible{outline:2px solid #3b82f6;outline-offset:3px;border-radius:8px}
    .ec-modal-head{display:flex;gap:16px;align-items:center;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.08);padding-right:48px}
    .ec-modal-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;background:linear-gradient(135deg,#3b82f6,#8b5cf6);flex-shrink:0}
    .ec-modal-head h3{margin:0;font-size:1.4rem;color:#fff}
    .ec-modal-desc{margin:4px 0 0;color:#94a3b8;font-size:.95rem}
    .ec-modal-body h4{color:#cbd5e1;margin:0 0 12px;font-size:.95rem;text-transform:uppercase;letter-spacing:.5px}
    .ec-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
    .ec-table{width:100%;border-collapse:collapse;font-size:.92rem;color:#e2e8f0}
    .ec-table th,.ec-table td{padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
    .ec-table th{background:rgba(255,255,255,.04);font-weight:600;color:#94a3b8;text-transform:uppercase;font-size:.78rem;letter-spacing:.5px}
    .ec-table td.num,.ec-table th.num{text-align:right;font-variant-numeric:tabular-nums}
    .ec-table tbody tr{transition:background .15s}
    .ec-table tbody tr:hover{background:rgba(59,130,246,.06)}
    .ec-table tr.total td{font-weight:700;color:#fff;background:rgba(59,130,246,.08);border-top:2px solid rgba(59,130,246,.3)}
    .ec-note{margin-top:16px;padding:12px 16px;background:rgba(59,130,246,.08);border-left:3px solid #3b82f6;border-radius:8px;color:#cbd5e1;font-size:.9rem;line-height:1.6}
    body.ec-modal-open{overflow:hidden}

    @media (prefers-reduced-motion: reduce){
      .ec-modal,.ec-modal-backdrop,.ec-modal-dialog,.ecriture-card,.ecriture-icon{transition:none !important;animation:none !important}
      .ec-modal-dialog{transform:none !important}
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <nav class="navbar">
    <div class="container">
      <a href="#" class="nav-logo">
        <div class="nav-logo-icon">EC</div>
        <div class="nav-logo-text">Ecriture <span>Comptable</span></div>
      </a>
    </div>
  </nav>

  <section class="section" id="ecritures">
    <div class="container">
      <div class="section-header">
        <div class="section-badge"><i class="fas fa-pen-nib"></i> Écritures Comptables</div>
        <h2 class="section-title">Les Écritures Comptables</h2>
        <p class="section-desc">Cliquez sur une carte pour voir un exemple détaillé avec débit, crédit et explication.</p>
      </div>

      <div class="ecritures-grid" id="ecrituresGrid">
        <button class="glass-card ecriture-card" data-key="paie"><div class="ecriture-icon icon-blue"><i class="fas fa-money-check-alt"></i></div><h3>La Paie</h3></button>
        <button class="glass-card ecriture-card" data-key="vente"><div class="ecriture-icon icon-emerald"><i class="fas fa-shopping-cart"></i></div><h3>Vente Marchandise</h3></button>
        <button class="glass-card ecriture-card" data-key="banque"><div class="ecriture-icon icon-purple"><i class="fas fa-university"></i></div><h3>Banque</h3></button>
        <button class="glass-card ecriture-card" data-key="amortissement"><div class="ecriture-icon icon-amber"><i class="fas fa-chart-line"></i></div><h3>Amortissements</h3></button>
        <button class="glass-card ecriture-card" data-key="location"><div class="ecriture-icon icon-cyan"><i class="fas fa-car"></i></div><h3>Location Voiture</h3></button>
        <button class="glass-card ecriture-card" data-key="leasing"><div class="ecriture-icon icon-rose"><i class="fas fa-file-contract"></i></div><h3>Leasing</h3></button>
        <button class="glass-card ecriture-card" data-key="stock"><div class="ecriture-icon icon-indigo"><i class="fas fa-boxes"></i></div><h3>Stock</h3></button>
        <button class="glass-card ecriture-card" data-key="fnp"><div class="ecriture-icon icon-amber"><i class="fas fa-file-invoice"></i></div><h3>Factures Non Parvenues</h3></button>
        <button class="glass-card ecriture-card" data-key="tva"><div class="ecriture-icon icon-emerald"><i class="fas fa-percent"></i></div><h3>Déclaration TVA</h3></button>
        <button class="glass-card ecriture-card" data-key="cm"><div class="ecriture-icon icon-blue"><i class="fas fa-coins"></i></div><h3>Cotisation Minimale</h3></button>
        <button class="glass-card ecriture-card" data-key="is"><div class="ecriture-icon icon-rose"><i class="fas fa-landmark"></i></div><h3>Impôt IS</h3></button>
        <button class="glass-card ecriture-card" data-key="patente"><div class="ecriture-icon icon-purple"><i class="fas fa-receipt"></i></div><h3>Patente TP</h3></button>
        <button class="glass-card ecriture-card" data-key="cession"><div class="ecriture-icon icon-cyan"><i class="fas fa-building"></i></div><h3>Cession Immob.</h3></button>
        <button class="glass-card ecriture-card" data-key="frais-bq"><div class="ecriture-icon icon-amber"><i class="fas fa-credit-card"></i></div><h3>Frais Bancaire</h3></button>
        <button class="glass-card ecriture-card" data-key="avoir"><div class="ecriture-icon icon-indigo"><i class="fas fa-undo"></i></div><h3>Facture Avoir</h3></button>
        <button class="glass-card ecriture-card" data-key="caisse"><div class="ecriture-icon icon-emerald"><i class="fas fa-cash-register"></i></div><h3>Écritures Caisse</h3></button>
        <button class="glass-card ecriture-card" data-key="gain-change"><div class="ecriture-icon icon-blue"><i class="fas fa-exchange-alt"></i></div><h3>Gain de Change</h3></button>
        <button class="glass-card ecriture-card" data-key="effet"><div class="ecriture-icon icon-rose"><i class="fas fa-handshake"></i></div><h3>Effet Commerce</h3></button>
        <button class="glass-card ecriture-card" data-key="douteux"><div class="ecriture-icon icon-amber"><i class="fas fa-user-slash"></i></div><h3>Client Douteux</h3></button>
        <button class="glass-card ecriture-card" data-key="cca"><div class="ecriture-icon icon-purple"><i class="fas fa-clock"></i></div><h3>Charges Constatées d'Avance</h3></button>
        <button class="glass-card ecriture-card" data-key="ecart"><div class="ecriture-icon icon-cyan"><i class="fas fa-balance-scale"></i></div><h3>Écart Conversion</h3></button>
      </div>
    </div>

    <!-- MODAL -->
    <div class="ec-modal" id="ecModal" aria-hidden="true">
      <div class="ec-modal-backdrop" data-close></div>
      <div class="ec-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="ecModalTitle">
        <button class="ec-modal-close" data-close aria-label="Fermer"><i class="fas fa-times"></i></button>
        <div class="ec-modal-head">
          <div class="ec-modal-icon" id="ecModalIcon"><i class="fas fa-book"></i></div>
          <div>
            <h3 id="ecModalTitle">Titre</h3>
            <p id="ecModalDesc" class="ec-modal-desc"></p>
          </div>
        </div>
        <div class="ec-modal-body">
          <h4>Exemple d'écriture</h4>
          <div class="ec-table-wrap">
            <table class="ec-table">
              <thead><tr><th>Compte</th><th>Libellé</th><th class="num">Débit</th><th class="num">Crédit</th></tr></thead>
              <tbody id="ecModalRows"></tbody>
            </table>
          </div>
          <p class="ec-note" id="ecModalNote"></p>
        </div>
      </div>
    </div>
  </section>

  <script>
    const ECRITURES_DATA = {
      paie:{title:"La Paie",icon:"fa-money-check-alt",desc:"Comptabilisation du salaire net, CNSS, AMO, IR et CIMR.",rows:[["6171","Rémunérations du personnel",50000,null],["4432","Rémunérations dues au personnel",null,38000],["4441","CNSS",null,4480],["4452","Mutuelles (AMO)",null,1120],["4452","CIMR",null,1500],["4434","IR à payer",null,4900]],note:"Le salaire brut est débité en 6171, les retenues sociales et fiscales sont créditées dans leurs comptes respectifs."},
      vente:{title:"Vente Marchandise",icon:"fa-shopping-cart",desc:"Facture de vente avec TVA 20%.",rows:[["3421","Clients",12000,null],["7111","Ventes de marchandises",null,10000],["4455","État - TVA facturée",null,2000]],note:"Vente HT 10 000 + TVA 20% = 12 000 TTC à recevoir du client."},
      banque:{title:"Banque",icon:"fa-university",desc:"Versement d'espèces de la caisse vers la banque.",rows:[["5141","Banque",5000,null],["5161","Caisse",null,5000]],note:"Mouvement entre comptes de trésorerie."},
      amortissement:{title:"Amortissements",icon:"fa-chart-line",desc:"Dotation annuelle d'un matériel de 100 000 sur 5 ans.",rows:[["6193","DEA des immobilisations corporelles",20000,null],["2833","Amort. installations techniques",null,20000]],note:"Amortissement linéaire : 100 000 / 5 ans = 20 000 DH/an."},
      location:{title:"Location Voiture",icon:"fa-car",desc:"Facture de location mensuelle d'un véhicule.",rows:[["6133","Locations et charges locatives",5000,null],["3455","État - TVA récupérable/charges",1000,null],["4411","Fournisseurs",null,6000]],note:"Location HT 5 000 + TVA 20% récupérable."},
      leasing:{title:"Leasing (Crédit-bail)",icon:"fa-file-contract",desc:"Redevance mensuelle de crédit-bail mobilier.",rows:[["6132","Redevances de crédit-bail",8000,null],["3455","État - TVA récupérable",1600,null],["4411","Fournisseur leasing",null,9600]],note:"Le bien n'apparaît pas à l'actif tant que l'option d'achat n'est pas levée."},
      stock:{title:"Variation de Stock",icon:"fa-boxes",desc:"Constatation du stock final de marchandises.",rows:[["3111","Marchandises (stock final)",30000,null],["6114","Variation de stocks de marchandises",null,30000]],note:"En fin d'exercice : annulation du stock initial puis constatation du stock final."},
      fnp:{title:"Factures Non Parvenues",icon:"fa-file-invoice",desc:"Charge constatée mais facture non reçue à la clôture.",rows:[["6125","Achats non stockés",4000,null],["3455","TVA récupérable sur FNP",800,null],["4417","Fournisseurs - factures non parvenues",null,4800]],note:"Écriture à contre-passer au début de l'exercice suivant."},
      tva:{title:"Déclaration TVA",icon:"fa-percent",desc:"Liquidation mensuelle/trimestrielle de la TVA.",rows:[["4455","État - TVA facturée",15000,null],["3455","État - TVA récupérable",null,9000],["4456","État - TVA due",null,6000]],note:"TVA due = TVA collectée − TVA déductible. À payer avant le 20 du mois suivant."},
      cm:{title:"Cotisation Minimale",icon:"fa-coins",desc:"CM = 0,5% du CA HT, minimum 3 000 DH.",rows:[["3453","Acomptes IS / CM",3500,null],["5141","Banque",null,3500]],note:"Imputable sur l'IS de l'exercice. Si CM > IS, la différence est perdue."},
      is:{title:"Impôt sur les Sociétés",icon:"fa-landmark",desc:"Constatation de l'IS de l'exercice.",rows:[["6701","Impôts sur les bénéfices",60000,null],["4453","État - IS",null,60000]],note:"L'IS est calculé sur le résultat fiscal selon le barème en vigueur."},
      patente:{title:"Taxe Professionnelle (Patente)",icon:"fa-receipt",desc:"Avis d'imposition annuel reçu.",rows:[["6161","Impôts et taxes directs",2500,null],["4453","État - impôts et taxes",null,2500]],note:"Taxe professionnelle due par les entreprises pour leur activité."},
      cession:{title:"Cession d'Immobilisation",icon:"fa-building",desc:"Vente d'un matériel : VO 50 000, amort 30 000, prix 25 000.",rows:[["3481","Créances sur cessions d'immo.",25000,null],["2833","Amort. cumulés",30000,null],["2332","Matériel et outillage",null,50000],["7513","PCEAC",null,5000]],note:"Plus-value de cession = 5 000 DH (25 000 − 20 000 VNA)."},
      "frais-bq":{title:"Frais Bancaires",icon:"fa-credit-card",desc:"Commissions et agios prélevés par la banque.",rows:[["6147","Services bancaires",200,null],["3455","TVA récupérable (10%)",20,null],["5141","Banque",null,220]],note:"TVA sur services bancaires au taux de 10%."},
      avoir:{title:"Facture d'Avoir",icon:"fa-undo",desc:"Retour de marchandises vendues 6 000 TTC.",rows:[["7111","Ventes de marchandises (RRR)",5000,null],["4455","TVA facturée",1000,null],["3421","Clients",null,6000]],note:"Écriture inverse d'une vente, comptes 7119/6119 utilisés pour les RRR."},
      caisse:{title:"Écritures de Caisse",icon:"fa-cash-register",desc:"Encaissement client en espèces.",rows:[["5161","Caisse",3000,null],["3421","Clients",null,3000]],note:"Limite légale : tout règlement > 20 000 DH doit passer par la banque."},
      "gain-change":{title:"Gain de Change",icon:"fa-exchange-alt",desc:"Règlement d'un client étranger avec un cours favorable.",rows:[["5141","Banque",11000,null],["3421","Clients étrangers",null,10500],["7331","Gains de change",null,500]],note:"Différence positive entre le cours de facturation et le cours de règlement."},
      effet:{title:"Effet de Commerce",icon:"fa-handshake",desc:"Acceptation d'une lettre de change par le client.",rows:[["3425","Clients - effets à recevoir",12000,null],["3421","Clients",null,12000]],note:"L'effet peut être encaissé à échéance, escompté ou endossé."},
      douteux:{title:"Client Douteux",icon:"fa-user-slash",desc:"Reclassement et provision d'un client en difficulté.",rows:[["3424","Clients douteux",10000,null],["3421","Clients",null,10000],["6196","DEP créances",6000,null],["3942","Prov. dépréciation clients",null,6000]],note:"Provision basée sur le risque estimé de non-recouvrement (HT)."},
      cca:{title:"Charges Constatées d'Avance",icon:"fa-clock",desc:"Loyer payé d'avance pour la période suivante.",rows:[["3491","Charges constatées d'avance",6000,null],["6131","Locations",null,6000]],note:"Régularisation à la clôture : on neutralise la part qui concerne l'exercice suivant."},
      ecart:{title:"Écart de Conversion",icon:"fa-balance-scale",desc:"Évaluation d'une dette en devise à la clôture.",rows:[["4411","Fournisseurs étrangers",1500,null],["4701","Écart de conversion - Passif",null,1500]],note:"À la clôture, dettes/créances en devises sont réévaluées au cours du jour."}
    };

    (function(){
      const modal=document.getElementById('ecModal');
      const dialog=modal.querySelector('.ec-modal-dialog');
      const title=document.getElementById('ecModalTitle');
      const desc=document.getElementById('ecModalDesc');
      const icon=document.getElementById('ecModalIcon');
      const rowsEl=document.getElementById('ecModalRows');
      const noteEl=document.getElementById('ecModalNote');
      const closeBtn=modal.querySelector('.ec-modal-close');
      const FOCUSABLE='a[href],button:not([disabled]),textarea,input,select,[tabindex]:not([tabindex="-1"])';
      let lastTrigger=null,isOpen=false;
      const fmt=n=>n==null?'':n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});

      function open(key,trigger){
        const d=ECRITURES_DATA[key];if(!d)return;
        lastTrigger=trigger||document.activeElement;
        title.textContent=d.title;
        desc.textContent=d.desc||'';
        icon.innerHTML=`<i class="fas ${d.icon}"></i>`;
        let td=0,tc=0;
        rowsEl.innerHTML=d.rows.map(([c,l,db,cr])=>{
          td+=db||0;tc+=cr||0;
          return `<tr><td><strong>${c}</strong></td><td>${l}</td><td class="num">${fmt(db)}</td><td class="num">${fmt(cr)}</td></tr>`;
        }).join('')+`<tr class="total"><td colspan="2">TOTAL</td><td class="num">${fmt(td)}</td><td class="num">${fmt(tc)}</td></tr>`;
        noteEl.textContent=d.note||'';
        modal.classList.remove('is-closing');
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden','false');
        document.body.classList.add('ec-modal-open');
        isOpen=true;
        requestAnimationFrame(()=>setTimeout(()=>closeBtn.focus(),60));
      }

      function close(){
        if(!isOpen)return;
        isOpen=false;
        modal.classList.add('is-closing');
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden','true');
        const finish=()=>{
          modal.classList.remove('is-closing');
          document.body.classList.remove('ec-modal-open');
          dialog.removeEventListener('transitionend',finish);
          if(lastTrigger&&typeof lastTrigger.focus==='function')lastTrigger.focus();
        };
        dialog.addEventListener('transitionend',finish);
        setTimeout(finish,300);
      }

      function trapTab(e){
        if(e.key!=='Tab')return;
        const f=dialog.querySelectorAll(FOCUSABLE);if(!f.length)return;
        const first=f[0],last=f[f.length-1];
        if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
        else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
      }

      document.querySelectorAll('#ecrituresGrid .ecriture-card').forEach(btn=>{
        btn.addEventListener('click',e=>{e.preventDefault();open(btn.dataset.key,btn);});
      });
      modal.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',close));
      document.addEventListener('keydown',e=>{
        if(!isOpen)return;
        if(e.key==='Escape'){e.preventDefault();close();}else trapTab(e);
      });
    })();
  </script>
</body>
</html>
